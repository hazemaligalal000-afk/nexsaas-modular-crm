name: NexSaaS CI/CD Pipeline

on:
  push:
    branches: [ master, main, 'release/*' ]
  pull_request:
    branches: [ master, main ]

jobs:
  test-php:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: nexsaas_test
          POSTGRES_USER: nexsaas
          POSTGRES_PASSWORD: password123
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, pdo, curl, pgsql
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      - name: Run PHPCS
        run: ./vendor/bin/phpcs --standard=phpcs.xml
      - name: Run PHPUnit
        run: ./vendor/bin/phpunit --configuration phpunit.xml

  test-react:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./modular_core/react-frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Type check (TypeScript)
        run: npm run build
      - name: Run Vitest
        run: npm run test:unit
      - name: Build production bundle
        run: npm run build

  build-docker:
    needs: [test-php, test-react]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build/Push Core
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.core
          push: true
          tags: nexsaas/modular-core:latest, nexsaas/modular-core:${{ github.sha }}
      - name: Build/Push AI Engine
        uses: docker/build-push-action@v5
        with:
          context: ./ai_engine
          push: true
          tags: nexsaas/ai-engine:latest
