version: "3.9"

services:
  # ─── PHP-FPM (Modular Core) ───────────────────────────────────────────────
  php-fpm:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: nexsaas_php
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-nexsaas}
      DB_USER: ${DB_USER:-nexsaas}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-nexsaas}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - nexsaas

  # ─── Nginx (serves PHP-FPM + static assets) ──────────────────────────────
  backend:
    image: nginx:1.25-alpine
    container_name: nexsaas_backend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php-fpm
    networks:
      - nexsaas

  # ─── React Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./modular_core/react-frontend
    container_name: nexsaas_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8080/api
    networks:
      - nexsaas

  # ─── PostgreSQL 16 ────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexsaas_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-nexsaas}
      POSTGRES_USER: ${DB_USER:-nexsaas}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./modular_core/database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nexsaas} -d ${DB_NAME:-nexsaas}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexsaas

  # ─── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexsaas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexsaas

  # ─── RabbitMQ 3 ───────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: nexsaas_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-nexsaas}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-secret}
      RABBITMQ_DEFAULT_VHOST: nexsaas
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - nexsaas

  # ─── FastAPI AI Engine ────────────────────────────────────────────────────
  fastapi:
    build:
      context: ./ai_engine
      dockerfile: ../docker/fastapi/Dockerfile
    container_name: nexsaas_fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-nexsaas}
      DB_USER: ${DB_USER:-nexsaas}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-nexsaas}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-secret}
      RABBITMQ_VHOST: nexsaas
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - nexsaas

  # ─── Celery Worker ────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./ai_engine
      dockerfile: ../docker/fastapi/Dockerfile
    container_name: nexsaas_celery
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-nexsaas}
      DB_USER: ${DB_USER:-nexsaas}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-nexsaas}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-secret}
      RABBITMQ_VHOST: nexsaas
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - nexsaas

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  nexsaas:
    driver: bridge
