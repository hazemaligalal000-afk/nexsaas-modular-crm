version: '3.8'

services:
  # ─── DATABASE ───
  database:
    image: mysql:8.0
    container_name: revos-db
    environment:
      MYSQL_DATABASE: revos_central
      MYSQL_ROOT_PASSWORD: enterprise_password
      MYSQL_USER: admin
      MYSQL_PASSWORD: enterprise_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./modular_core/database/001_enterprise_schema.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"

  # ─── REDIS CACHE ───
  cache:
    image: redis:7-alpine
    container_name: revos-redis
    ports:
      - "6379:6379"

  # ─── PHP BACKEND (Core System) ───
  backend:
    build:
      context: ./modular_core
      dockerfile: Dockerfile
    container_name: revos-backend
    volumes:
      - ./modular_core:/var/www/html
    environment:
      DB_HOST: database
      DB_NAME: revos_central
      DB_USER: admin
      DB_PASS: enterprise_password
      REDIS_HOST: cache
      JWT_SECRET: AI_REVOS_JWT_SECRET_KEY_ENTERPRISE_2026
    ports:
      - "8080:80"
    depends_on:
      - database
      - cache

  # ─── AI MICROSERVICE ───
  ai_engine:
    build:
      context: ./ai_engine
      dockerfile: Dockerfile
    container_name: revos-ai
    environment:
      REDIS_HOST: cache
    ports:
      - "8000:8000"
    depends_on:
      - cache

  # ─── FRONTEND (React) ───
  frontend:
    build:
      context: ./modular_core/react-frontend
      dockerfile: Dockerfile
    container_name: revos-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
