apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexsaas-ai-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexsaas-ai-engine
  template:
    metadata:
      labels:
        app: nexsaas-ai-engine
    spec:
      containers:
      - name: fastapi
        image: nexsaas/ai-engine:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: ai-secrets
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
          requests:
            cpu: "1"
            memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: nexsaas-ai-svc
spec:
  selector:
    app: nexsaas-ai-engine
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
