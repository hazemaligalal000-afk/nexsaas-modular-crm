apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexsaas.fullname" . }}
  labels:
    {{- include "nexsaas.labels" . | nindent 4 }}
  annotations:
    ad.datadoghq.com/nexsaas.logs: '[{"source": "php", "service": "nexsaas-crm"}]'
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "nexsaas.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/path: '/api/metrics'
        prometheus.io/port: '80'
      labels:
        {{- include "nexsaas.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: APP_ENV
              value: "production"
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: nexsaas-secrets
                  key: sentry-dsn
            - name: SENTRY_RELEASE
              value: "{{ .Values.image.tag | default .Chart.AppVersion }}"
            # Datadog APM
            - name: DD_ENV
              value: "production"
            - name: DD_SERVICE
              value: "nexsaas-crm"
            - name: DD_VERSION
              value: "{{ .Values.image.tag | default .Chart.AppVersion }}"
            - name: DD_PROFILING_ENABLED
              value: "true"
            - name: DD_TRACE_ENABLED
              value: "true"
            - name: DD_APPSEC_ENABLED
              value: "true"
            # Database and Redis Connections
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: nexsaas-secrets
                  key: db-host
            - name: REDIS_HOST
              value: "{{ .Values.redis.host }}"
          livenessProbe:
            httpGet:
              path: /api/system/healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/system/readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
