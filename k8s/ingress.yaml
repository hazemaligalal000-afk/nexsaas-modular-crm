apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexsaas-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - app.nexsaas.com
    - api.nexsaas.com
    - ai.nexsaas.com
    secretName: nexsaas-tls
  rules:
  - host: app.nexsaas.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nexsaas-frontend
            port:
              number: 80
  - host: api.nexsaas.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nexsaas-backend
            port:
              number: 8080
  - host: ai.nexsaas.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nexsaas-ai-engine
            port:
              number: 8000
