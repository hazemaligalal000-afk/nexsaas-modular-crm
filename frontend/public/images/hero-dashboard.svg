<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#F7FAFC"/>
  
  <!-- Dashboard mockup -->
  <rect x="50" y="50" width="1100" height="700" rx="12" fill="white" stroke="#E2E8F0" stroke-width="2"/>
  
  <!-- Header -->
  <rect x="50" y="50" width="1100" height="60" rx="12" fill="#667EEA"/>
  <circle cx="90" cy="80" r="15" fill="white" opacity="0.3"/>
  <rect x="120" y="70" width="150" height="20" rx="4" fill="white" opacity="0.3"/>
  
  <!-- Sidebar -->
  <rect x="50" y="110" width="200" height="640" fill="#F7FAFC"/>
  <rect x="70" y="130" width="160" height="30" rx="4" fill="#667EEA" opacity="0.2"/>
  <rect x="70" y="170" width="160" height="30" rx="4" fill="#E2E8F0"/>
  <rect x="70" y="210" width="160" height="30" rx="4" fill="#E2E8F0"/>
  <rect x="70" y="250" width="160" height="30" rx="4" fill="#E2E8F0"/>
  
  <!-- Main content area -->
  <!-- KPI Cards -->
  <rect x="280" y="130" width="250" height="120" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="300" y="150" width="100" height="20" rx="4" fill="#E2E8F0"/>
  <rect x="300" y="180" width="150" height="30" rx="4" fill="#667EEA" opacity="0.3"/>
  
  <rect x="560" y="130" width="250" height="120" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="580" y="150" width="100" height="20" rx="4" fill="#E2E8F0"/>
  <rect x="580" y="180" width="150" height="30" rx="4" fill="#48BB78" opacity="0.3"/>
  
  <rect x="840" y="130" width="250" height="120" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="860" y="150" width="100" height="20" rx="4" fill="#E2E8F0"/>
  <rect x="860" y="180" width="150" height="30" rx="4" fill="#F56565" opacity="0.3"/>
  
  <!-- Chart area -->
  <rect x="280" y="280" width="810" height="350" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="300" y="300" width="120" height="20" rx="4" fill="#E2E8F0"/>
  
  <!-- Simple bar chart visualization -->
  <rect x="320" y="500" width="60" height="100" rx="4" fill="#667EEA" opacity="0.6"/>
  <rect x="400" y="450" width="60" height="150" rx="4" fill="#667EEA" opacity="0.6"/>
  <rect x="480" y="480" width="60" height="120" rx="4" fill="#667EEA" opacity="0.6"/>
  <rect x="560" y="420" width="60" height="180" rx="4" fill="#667EEA" opacity="0.6"/>
  <rect x="640" y="460" width="60" height="140" rx="4" fill="#667EEA" opacity="0.6"/>
  <rect x="720" y="490" width="60" height="110" rx="4" fill="#667EEA" opacity="0.6"/>
  <rect x="800" y="440" width="60" height="160" rx="4" fill="#667EEA" opacity="0.6"/>
  <rect x="880" y="470" width="60" height="130" rx="4" fill="#667EEA" opacity="0.6"/>
  
  <!-- Table area -->
  <rect x="280" y="660" width="810" height="70" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="300" y="680" width="200" height="15" rx="4" fill="#E2E8F0"/>
  <rect x="300" y="705" width="150" height="15" rx="4" fill="#E2E8F0" opacity="0.5"/>
  
  <!-- Decorative elements -->
  <circle cx="1050" cy="180" r="8" fill="#48BB78"/>
  <circle cx="1070" cy="180" r="8" fill="#F56565"/>
  <circle cx="1090" cy="180" r="8" fill="#667EEA"/>
  
  <!-- Text overlay -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2D3748" text-anchor="middle">
    NexSaaS Dashboard Preview
  </text>
</svg>
