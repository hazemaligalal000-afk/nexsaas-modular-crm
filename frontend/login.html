<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexSaaS Login | Multi-Company Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            background: radial-gradient(circle at center, rgba(99, 102, 241, 0.15), transparent 600px), var(--bg-dark);
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(12px);
        }
        .login-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .login-brand .logo {
            width: 40px;
            height: 40px;
        }
        .login-brand h1 {
            font-size: 2rem;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-indigo);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
        .btn-login {
            width: 100%;
            margin-top: 12px;
            padding: 12px;
            text-align: center;
            justify-content: center;
        }
        .error-message {
            color: var(--accent-red);
            font-size: 0.85rem;
            margin-bottom: 16px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body class="login-page">

    <div class="login-card">
        <div class="login-brand">
            <div class="logo"></div>
            <h1>NexSaaS</h1>
        </div>
        
        <div class="error-message" id="loginError">Invalid credentials.</div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" placeholder="admin" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-login">Sign In</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorElement = document.getElementById('loginError');
            const submitBtn = document.querySelector('.btn-login');

            // Prevent double submission
            submitBtn.disabled = true;
            submitBtn.textContent = 'Authenticating...';
            errorElement.style.display = 'none';

            try {
                // Point to our new API Auth controller
                const response = await fetch('http://localhost:8080/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (response.ok && result.status === 'success') {
                    // Store the SaaS API Key physically injected for the Tenant
                    localStorage.setItem('nexsaas_api_key', result.data.api_key);
                    localStorage.setItem('nexsaas_user_id', result.data.user_id);
                    localStorage.setItem('nexsaas_org_id', result.data.organization_id);
                    
                    // Redirect to the Kanban Dashboard
                    window.location.href = 'index.html';
                } else {
                    throw new Error(result.message || 'Authentication failed');
                }
            } catch (error) {
                errorElement.textContent = error.message;
                errorElement.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
